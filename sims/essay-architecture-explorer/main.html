<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Essay Architecture Explorer</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f7fa; }
.container { width: 100%; height: 620px; display: flex; position: relative; }
#network { flex: 1; background: white; }
.title {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  font-size: 16px; font-weight: bold; color: #1a237e;
  background: rgba(255,255,255,0.9); padding: 4px 14px; border-radius: 6px;
  pointer-events: none; z-index: 10; white-space: nowrap;
}
.right-panel {
  width: 255px; background: #f3e5f5; border-left: 2px solid #ce93d8;
  padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
}
.right-panel h3 { font-size: 13px; color: #6A1B9A; }
#detail-panel {
  display: none; background: white; border-radius: 8px;
  border: 2px solid #ce93d8; padding: 10px;
}
.d-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
.d-desc  { font-size: 12px; color: #333; margin-bottom: 8px; line-height: 1.5; }
.d-label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
#detail-panel ul { font-size: 12px; margin-left: 14px; line-height: 1.6; color: #333; }
.legend { display: flex; flex-direction: column; gap: 4px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.leg-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
#hint {
  background: white; border-radius: 8px; border: 1px solid #ce93d8;
  padding: 10px; font-size: 12px; color: #555; line-height: 1.5;
}
</style>
</head>
<body>
<div class="container">
  <div id="network"></div>
  <div class="title">Essay Architecture Explorer</div>
  <div class="right-panel">
    <h3>Essay Component Details</h3>
    <div id="detail-panel"></div>
    <div id="hint">
      <strong>Click any section</strong> to see its role in the essay, plus the key parts it should contain.
    </div>
    <h3 style="margin-top:4px">Legend</h3>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#1565C0"></div>Introduction</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2E7D32"></div>Body Paragraphs</div>
      <div class="leg-item"><div class="leg-dot" style="background:#F57F17"></div>Counterclaim</div>
      <div class="leg-item"><div class="leg-dot" style="background:#6A1B9A"></div>Conclusion</div>
    </div>
  </div>
</div>
<script src="essay-architecture-explorer.js"></script>
</body>
</html>
