<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Literary Genre Explorer</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f7fa; }
.container { width: 100%; height: 620px; display: flex; position: relative; }
#network { flex: 1; background: white; }
.title {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  font-size: 16px; font-weight: bold; color: #1a237e;
  background: rgba(255,255,255,0.9); padding: 4px 14px; border-radius: 6px;
  pointer-events: none; z-index: 10; white-space: nowrap;
}
.right-panel {
  width: 250px; background: #f3f3ff; border-left: 2px solid #c5cae9;
  padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
}
.right-panel h3 { font-size: 13px; color: #3949ab; }
#info-panel {
  display: none; background: white; border-radius: 8px;
  border: 2px solid #9fa8da; padding: 10px;
}
#hint {
  background: white; border-radius: 8px; border: 1px solid #c5cae9;
  padding: 10px; font-size: 12px; color: #555; line-height: 1.5;
}
.legend { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.leg-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <div id="network"></div>
  <div class="title">Literary Genre Explorer</div>
  <div class="right-panel">
    <h3>Genre Details</h3>
    <div id="info-panel"></div>
    <div id="hint">
      <strong>Click any node</strong> to learn about that literary category or subgenre, with examples and key characteristics.
    </div>
    <h3 style="margin-top:4px">Major Categories</h3>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#1565C0"></div>Fiction</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1B5E20"></div>Nonfiction</div>
      <div class="leg-item"><div class="leg-dot" style="background:#B71C1C"></div>Drama</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4527A0"></div>Poetry</div>
    </div>
  </div>
</div>
<script src="literary-genre-explorer.js"></script>
</body>
</html>
