<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Argument Anatomy Explorer</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f7fa; }

.container { position: relative; width: 100%; height: 650px; display: flex; }

#network { flex: 1; height: 100%; background: #ffffff; }

.title {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  font-size: 17px; font-weight: bold; color: #1a237e;
  background: rgba(255,255,255,0.92); padding: 4px 14px; border-radius: 6px;
  pointer-events: none; z-index: 10; white-space: nowrap;
}

.toolbar {
  position: absolute; top: 50px; left: 10px;
  display: flex; flex-direction: column; gap: 6px; z-index: 10;
}
.toolbar label { font-size: 11px; color: #555; }
select {
  font-size: 12px; padding: 4px 6px; border-radius: 5px;
  border: 1px solid #bbb; background: white; cursor: pointer; width: 180px;
}
.btn {
  font-size: 12px; padding: 6px 10px; border: none; border-radius: 5px;
  cursor: pointer; font-weight: bold;
}
.btn-build  { background: #1565C0; color: white; }
.btn-reset  { background: #757575; color: white; display: none; }
.btn:hover  { opacity: 0.85; }

.right-panel {
  width: 260px; min-width: 220px; background: #f0f4ff;
  border-left: 2px solid #c5cae9; padding: 10px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.right-panel h3 { font-size: 13px; color: #3949ab; margin-bottom: 2px; }

#info-panel {
  display: none; background: white; border-radius: 8px;
  border: 2px solid #9fa8da; padding: 10px;
}
.panel-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
.panel-section { font-size: 12px; line-height: 1.55; margin-bottom: 8px; color: #333; }
.panel-section ul { margin-left: 14px; margin-top: 4px; }
.panel-section li { margin-bottom: 3px; }

.hint-box {
  background: white; border-radius: 8px; border: 1px solid #c5cae9;
  padding: 10px; font-size: 12px; color: #555; line-height: 1.5;
}

.overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.55);
  z-index: 100; align-items: center; justify-content: center;
}
.modal {
  background: white; border-radius: 10px; padding: 20px;
  width: 420px; max-width: 95vw; box-shadow: 0 6px 24px rgba(0,0,0,0.3);
}
.modal h2 { font-size: 16px; color: #1565C0; margin-bottom: 12px; }
.modal label { font-size: 12px; font-weight: bold; color: #444; display: block; margin-bottom: 3px; margin-top: 10px; }
.modal textarea {
  width: 100%; font-size: 12px; padding: 6px; border: 1px solid #bbb;
  border-radius: 5px; resize: vertical; min-height: 52px;
}
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn-cancel { background: #e0e0e0; color: #333; }
</style>
</head>
<body>
<div class="container">
  <div id="network"></div>
  <div class="title">Argument Anatomy Explorer — Toulmin Model</div>

  <div class="toolbar">
    <label>Example source:</label>
    <select id="source-select">
      <option value="mlk">Letter from Birmingham Jail</option>
      <option value="lincoln">Lincoln's Second Inaugural</option>
      <option value="student">Sample Student Essay</option>
    </select>
    <button class="btn btn-build" id="build-btn">Build My Argument</button>
    <button class="btn btn-reset" id="reset-btn">Reset Diagram</button>
  </div>

  <div class="right-panel">
    <h3>Argument Component Details</h3>
    <div id="info-panel"></div>
    <div class="hint-box" id="hint-box">
      <strong>Click any node</strong> to see its definition, an example from the selected text, and diagnostic questions to help you find it in any argument.
    </div>
  </div>
</div>

<div class="overlay" id="build-overlay">
  <div class="modal">
    <h2>Build My Argument</h2>
    <label>Claim — what is your main position?</label>
    <textarea id="b-claim" placeholder="e.g. Schools should start later in the morning."></textarea>
    <label>Evidence — what facts or examples support it?</label>
    <textarea id="b-evidence" placeholder="e.g. Studies show that teens need 8–10 hours of sleep…"></textarea>
    <label>Warrant — why does the evidence prove your claim?</label>
    <textarea id="b-warrant" placeholder="e.g. If teens are sleep-deprived, academic performance suffers."></textarea>
    <label>Counterclaim — what would an opponent say?</label>
    <textarea id="b-counter" placeholder="e.g. Later starts disrupt working parents' schedules."></textarea>
    <div class="modal-btns">
      <button class="btn btn-cancel" id="cancel-build">Cancel</button>
      <button class="btn btn-build"  id="submit-build">Build Diagram</button>
    </div>
  </div>
</div>

<script src="argument-anatomy-explorer.js"></script>
</body>
</html>
