# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'US High School English/Language Arts'
site_description: 'An intelligent textbook for US high school English/Language Arts aligned with the Common Core State Standards (CCSS-ELA) developed by NGA and CCSSO.'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/english-language-arts/'

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/english-language-arts'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Navigation
# IMPORTANT: do NOT add `navigation.tabs` — these books use side navigation
# optimized for wide landscape screens.
nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
      - List of Chapters: chapters/index.md
      - 1. Foundations of ELA: chapters/01-foundations/index.md
      - 2. Literary Genres: chapters/02-literary-genres/index.md
      - 3. Narrative Elements: chapters/03-narrative-elements/index.md
      - 4. Figurative Language: chapters/04-figurative-language/index.md
      - 5. Narrative Techniques: chapters/05-narrative-techniques/index.md
      - 6. Informational Text: chapters/06-informational-text/index.md
      - 7. Foundational Documents: chapters/07-foundational-documents/index.md
      - 8. Critical Thinking: chapters/08-critical-thinking/index.md
      - 9. Writing Process: chapters/09-writing-process/index.md
      - 10. Writing Modes: chapters/10-writing-modes/index.md
      - 11. Research and Citation: chapters/11-research-citation/index.md
      - 12. Grammar: chapters/12-grammar/index.md
      - 13. Language Conventions: chapters/13-language-conventions/index.md
      - 14. Speaking and Listening: chapters/14-speaking-listening/index.md
      - 15. Media Literacy: chapters/15-media-literacy/index.md
      - 16. Systems Thinking and AI: chapters/16-systems-thinking-ai/index.md
      - 17. Capstone Project: chapters/17-capstone/index.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      - Concept Enumeration: learning-graph/concept-list.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Graph Quality Analysis: learning-graph/quality-metrics.md
      - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
      - Mascot Style Guide: learning-graph/mascot-test.md

  - MicroSims:
      - List of MicroSims: sims/index.md
      - Learning Graph Viewer: sims/graph-viewer/index.md

  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'indigo'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - css/mascot.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'US High School English/Language Arts'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
