# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  palette:
    primary: 'indigo'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  - social
  #  Uncomment after running `pip install mkdocs-glightbox`:
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - css/mascot.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files, image prompts, mascot character sheets, and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  img/mascot/character-sheet.md
  prompts/*
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'English Language Arts'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
